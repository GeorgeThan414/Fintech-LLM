<!DOCTYPE html>
<html lang="en">
<head>

    <title>{% block title %}Stock Forecast Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

        <nav class="navbar">
            <div class="container">

    <footer>
